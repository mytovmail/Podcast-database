<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר הפודקאסטים העולמי</title>
    <!-- Tailwind CSS לעיצוב מתקדם -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 32px 32px;
            padding-bottom: 60px; /* מרווח לבאנר ההודעות */
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: left 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-left: 2.5rem;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen relative overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-900">
    
    <!-- תפריט ניווט עליון -->
    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="font-black text-xl tracking-tight text-indigo-900">מאגר הפודקאסטים</div>
            <a href="about.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors bg-slate-100 hover:bg-indigo-50 px-4 py-2 rounded-full">אודות והצטרפות</a>
        </div>
    </nav>

    <!-- הילת גרדיאנט ברקע -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-[500px] bg-gradient-to-b from-indigo-500/10 via-purple-500/5 to-transparent blur-3xl -z-10 rounded-full pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-16">
        
        <!-- אזור כותרת -->
        <header class="text-center mb-16 fade-up" style="animation-delay: 0.1s;">
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-slate-700 to-slate-900">הספרייה המרכזית</span>
            </h1>
            <p class="text-slate-500 text-lg md:text-xl max-w-2xl mx-auto font-medium leading-relaxed">
                מאגר ענק של יוצרים מכל גווני הקשת. האזנה לפרקים פתוחה לחברי הקבוצה בלבד.
            </p>
        </header>

        <!-- אזור חיפוש וסינון מתקדם -->
        <div class="max-w-4xl mx-auto mb-16 fade-up" style="animation-delay: 0.2s;">
            <div class="bg-white/70 backdrop-blur-xl p-3 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white flex flex-col md:flex-row gap-3">
                <div class="relative flex-1 group">
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none transition-colors group-focus-within:text-indigo-600">
                        <svg class="w-5 h-5 text-slate-400 group-focus-within:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" class="block w-full pr-12 pl-4 py-4 border-0 bg-transparent rounded-2xl leading-5 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium text-slate-700 text-lg" placeholder="חפש פרק או יוצר מתוך המאגר...">
                </div>
                
                <div class="hidden md:block w-px bg-slate-200 my-2"></div>

                <div class="w-full md:w-56">
                    <select id="sort-select" class="block w-full px-4 py-4 border-0 bg-transparent rounded-2xl leading-5 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all cursor-pointer font-medium text-slate-600 appearance-none text-lg">
                        <option value="newest">הכי חדשים קודם</option>
                        <option value="oldest">הכי ישנים קודם</option>
                        <option value="a-z">לפי א'-ב'</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="error-msg" class="hidden max-w-3xl mx-auto text-center text-red-600 bg-red-50 p-6 rounded-2xl border border-red-100 mb-8 font-medium"></div>

        <!-- רשימת הפודקאסטים -->
        <div id="podcast-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- באנר הודעות מהמנהלים -->
    <div id="announcement-banner" class="hidden fixed bottom-4 right-4 left-4 md:left-auto md:w-[400px] bg-slate-900/95 backdrop-blur-xl text-white p-4 rounded-2xl shadow-2xl border border-slate-700 z-50 transform transition-transform translate-y-full flex items-start gap-3">
        <div class="bg-indigo-500/20 text-indigo-400 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
        </div>
        <div>
            <h4 class="font-bold text-sm text-indigo-300 mb-1">הודעת מערכת</h4>
            <p id="announcement-text" class="text-sm font-medium leading-snug text-slate-200"></p>
        </div>
        <button onclick="document.getElementById('announcement-banner').style.display='none'" class="text-slate-400 hover:text-white mr-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
        </button>
    </div>

    <script>
        // --- הגדרות הדרייב ---
        const API_KEY = 'AIzaSyDTsvbTq1RzpI96B0njiKWEJ65jBvbbDwc'; 
        const FOLDER_ID = '1YvJzJJlKzKMunkYQWAqwFGK6VElIW-WT';
        
        let allPodcasts = [];
        let siteConfig = { groupPassword: "", announcement: "" };
        let isMember = false;

        // שלב 1: פונקציית האתחול של האתר
        async function initApp() {
            try {
                // משיכת קובץ ההגדרות מהשרת (רק אם אנחנו מחוברים דרך רשת תקינה ולא בתצוגה מקדימה)
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    const res = await fetch('config.json?v=' + new Date().getTime());
                    if (res.ok) {
                        siteConfig = await res.json();
                    }
                } else {
                    console.log("סביבת תצוגה מקדימה: מדלג על משיכת קובץ config.json");
                }
                
                // בדיקת הודעת מערכת
                if (siteConfig.announcement && siteConfig.announcement.trim() !== '') {
                    const banner = document.getElementById('announcement-banner');
                    document.getElementById('announcement-text').textContent = siteConfig.announcement;
                    banner.classList.remove('hidden');
                    setTimeout(() => banner.classList.remove('translate-y-full'), 1000);
                }

                // בדיקה אם למשתמש יש את הסיסמה הנכונה שמורה בדפדפן
                const savedPassword = localStorage.getItem('site_password');
                isMember = (savedPassword === siteConfig.groupPassword && siteConfig.groupPassword !== "");

            } catch(e) {
                console.error("שגיאה בטעינת הגדרות האתר", e);
            }

            // אחרי שבדקנו הרשאות והודעות, מתחילים לטעון את הפודקאסטים מדרייב
            loadPodcasts();
        }

        async function loadPodcasts() {
            if (API_KEY === 'YOUR_GOOGLE_API_KEY_HERE') {
                showError('חובה להכניס מפתח API בקוד.');
                removeSkeletons();
                return;
            }

            const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType,createdTime)&orderBy=createdTime+desc`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    showError(data.error.message);
                    removeSkeletons();
                    return;
                }

                allPodcasts = data.files.filter(file => file.mimeType.includes('audio') || file.mimeType.includes('video'));
                applyFilters();

            } catch (err) {
                showError('שגיאת תקשורת מול הדרייב.');
                removeSkeletons();
            }
        }

        function removeSkeletons() {
            document.querySelectorAll('.skeleton-card').forEach(s => s.remove());
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const sortOrder = document.getElementById('sort-select').value;

            let filtered = allPodcasts.filter(file => file.name.replace(/\.[^/.]+$/, "").toLowerCase().includes(searchTerm));

            if (sortOrder === 'newest') filtered.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));
            else if (sortOrder === 'oldest') filtered.sort((a, b) => new Date(a.createdTime) - new Date(b.createdTime));
            else if (sortOrder === 'a-z') filtered.sort((a, b) => a.name.localeCompare(b.name, 'he'));

            renderPodcasts(filtered);
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);

        function renderPodcasts(files) {
            const list = document.getElementById('podcast-list');
            list.innerHTML = ''; 

            if (files.length === 0) {
                list.innerHTML = '<div class="col-span-full text-center text-slate-500 py-16 bg-white/50 rounded-[2rem] shadow-sm font-medium">לא נמצאו פרקים.</div>';
                list.classList.remove('grid');
                return;
            }
            list.classList.add('grid');

            files.forEach((file, index) => {
                const audioUrl = `https://drive.google.com/uc?export=download&id=${file.id}`;
                const formattedDate = new Date(file.createdTime).toLocaleDateString('he-IL', { year: 'numeric', month: 'short', day: 'numeric' });
                const cleanName = file.name.replace(/\.[^/.]+$/, "");

                const card = document.createElement('div');
                card.className = `fade-up bg-white rounded-[2rem] p-7 shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-xl border border-slate-100 transition-all duration-300 transform hover:-translate-y-1 flex flex-col justify-between group relative overflow-hidden`;
                card.style.animationDelay = `${Math.min(index * 0.05, 0.4)}s`;
                
                // יצירת תוכן הכרטיסייה
                let playerHTML = '';
                
                if (isMember) {
                    // נגן שמע מלא עם שליטת מהירות
                    playerHTML = `
                    <div dir="ltr" class="audio-player-wrapper bg-slate-50 p-3 rounded-2xl flex items-center gap-3 mt-6 border border-slate-100">
                        <button class="play-btn w-10 h-10 flex-shrink-0 bg-white border border-slate-200 text-slate-800 rounded-full flex items-center justify-center hover:text-indigo-600 transition-all shadow-sm">
                            <svg class="play-icon w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="pause-icon w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <div class="flex-1">
                            <div class="flex justify-between text-[10px] text-slate-400 font-bold mb-1 uppercase">
                                <span class="current-time">00:00</span>
                                <span class="duration">--:--</span>
                            </div>
                            <div class="progress-container h-1.5 bg-slate-200 rounded-full cursor-pointer relative">
                                <div class="progress-bar absolute left-0 top-0 h-full bg-slate-800 rounded-full w-0"></div>
                            </div>
                        </div>
                        <button class="speed-btn text-xs font-bold text-slate-500 hover:text-indigo-600 bg-white border border-slate-200 px-2 py-1 rounded-lg transition-colors min-w-[36px]" title="מהירות השמעה">1x</button>
                        <audio src="${audioUrl}" type="${file.mimeType}" preload="none" class="hidden"></audio>
                    </div>`;
                } else {
                    // נגן נעול למי שלא בקבוצה
                    playerHTML = `
                    <div class="relative mt-6">
                        <div class="filter blur-sm select-none pointer-events-none opacity-40">
                            <div class="bg-slate-50 p-3 rounded-2xl flex items-center gap-4 border border-slate-100">
                                <div class="w-10 h-10 bg-white border border-slate-200 rounded-full"></div>
                                <div class="flex-1"><div class="h-1.5 bg-slate-200 rounded-full w-full"></div></div>
                            </div>
                        </div>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <a href="about.html" class="bg-indigo-600/90 backdrop-blur text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-lg hover:bg-indigo-700 transition-colors flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" /></svg>
                                דרושה הצטרפות להאזנה
                            </a>
                        </div>
                    </div>`;
                }

                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-600 uppercase tracking-wider">פודקאסט</span>
                            <span class="text-xs text-slate-400 font-medium">${formattedDate}</span>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 leading-snug group-hover:text-indigo-600 transition-colors line-clamp-2">${cleanName}</h2>
                    </div>
                    ${playerHTML}
                `;
                list.appendChild(card);
            });

            if (isMember) attachAudioListeners();
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function attachAudioListeners() {
            const players = document.querySelectorAll('.audio-player-wrapper');
            let currentlyPlaying = null;
            const speedOptions = [1, 1.25, 1.5, 1.75, 2];

            players.forEach(wrapper => {
                const audio = wrapper.querySelector('audio');
                const playBtn = wrapper.querySelector('.play-btn');
                const playIcon = wrapper.querySelector('.play-icon');
                const pauseIcon = wrapper.querySelector('.pause-icon');
                const progressContainer = wrapper.querySelector('.progress-container');
                const progressBar = wrapper.querySelector('.progress-bar');
                const currentTimeEl = wrapper.querySelector('.current-time');
                const durationEl = wrapper.querySelector('.duration');
                const speedBtn = wrapper.querySelector('.speed-btn');
                
                let currentSpeedIndex = 0;

                audio.addEventListener('loadedmetadata', () => { durationEl.textContent = formatTime(audio.duration); });

                playBtn.addEventListener('click', () => {
                    if (currentlyPlaying && currentlyPlaying !== audio) currentlyPlaying.pause(); 
                    if (audio.paused) { audio.play(); currentlyPlaying = audio; } 
                    else { audio.pause(); }
                });

                // כפתור מהירות השמעה
                speedBtn.addEventListener('click', () => {
                    currentSpeedIndex = (currentSpeedIndex + 1) % speedOptions.length;
                    const newSpeed = speedOptions[currentSpeedIndex];
                    audio.playbackRate = newSpeed;
                    speedBtn.textContent = newSpeed + 'x';
                    speedBtn.classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-200');
                });

                audio.addEventListener('play', () => {
                    playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden');
                    playBtn.classList.add('bg-slate-900', 'text-white');
                });

                audio.addEventListener('pause', () => {
                    playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden');
                    playBtn.classList.remove('bg-slate-900', 'text-white');
                });

                audio.addEventListener('timeupdate', () => {
                    progressBar.style.width = `${(audio.currentTime / audio.duration) * 100 || 0}%`;
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                });

                progressContainer.addEventListener('click', (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
                });
                
                audio.addEventListener('ended', () => {
                    audio.currentTime = 0; playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden'); progressBar.style.width = '0%';
                });
            });
        }

        function showError(msg) {
            removeSkeletons();
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = msg; errorEl.classList.remove('hidden');
        }

        // הפעלת האפליקציה!
        initApp();
    </script>
</body>
</html>
