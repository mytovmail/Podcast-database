<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר הפודקאסטים - סייר חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap');
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        
        /* רקע נקודות עדין */
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* אנימציות כניסה */
        .fade-in { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* פעימה למסך פתיחה */
        .pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .8; transform: scale(1.05); } }

        /* אנימציית ריחוף לרקע הזכוכית */
        .float-slow { animation: float 10s ease-in-out infinite; }
        .float-slower { animation: float 14s ease-in-out infinite reverse; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* גלילת טקסט לבאנר ההודעות */
        @keyframes scroll-text {
            0%, 15% { transform: translateX(0); } 
            100% { transform: translateX(100%); } 
        }
        .scroll-active {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 24s linear infinite;
            padding-left: 2rem;
        }
        .scroll-active:hover {
            animation-play-state: paused;
        }

        /* עיצוב פס גלילה */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen relative selection:bg-indigo-200 selection:text-indigo-900 flex flex-col bg-pattern z-0">
    
    <!-- רקע גרפי מודרני (Glassmorphism blobs) -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-[-1]">
        <div class="absolute top-[-10%] left-[10%] w-[500px] h-[500px] rounded-full bg-gradient-to-br from-indigo-200/30 to-purple-200/30 blur-3xl float-slow"></div>
        <div class="absolute bottom-[10%] right-[-5%] w-[600px] h-[600px] rounded-full bg-gradient-to-tr from-blue-200/30 to-indigo-100/30 blur-3xl float-slower"></div>
        <div class="absolute top-[40%] right-[30%] w-[300px] h-[300px] rounded-full bg-gradient-to-br from-orange-50/40 to-amber-100/40 blur-3xl float-slow" style="animation-delay: 2s;"></div>
    </div>

    <!-- מסך פתיחה חכם -->
    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700 bg-slate-900">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 opacity-95"></div>
        <div class="relative z-10 flex flex-col items-center text-center">
            <div class="w-24 h-24 bg-white/5 rounded-3xl flex items-center justify-center border border-white/10 mb-8 pulse-slow shadow-[0_0_30px_rgba(99,102,241,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </div>
            <h1 class="text-4xl font-black text-white mb-2 tracking-tight">מאגר הפודקאסטים</h1>
            <p id="splash-status" class="text-indigo-300 text-sm font-medium mb-12">מכין את הנתונים עבורך...</p>
            
            <div class="mt-8 text-slate-400 text-sm opacity-80 fade-in" style="animation-delay: 0.3s;">
                פותח על ידי 
                <a href="https://mytovmail.github.io/Good-heart/" target="_blank" class="text-indigo-400 font-bold hover:text-indigo-300 hover:underline transition-colors">
                    לב טוב
                </a>
            </div>
        </div>
    </div>

    <!-- ניווט עליון -->
    <nav class="w-full bg-white/60 backdrop-blur-xl border-b border-white/50 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="font-black text-xl text-indigo-900 flex items-center gap-2 cursor-pointer group" onclick="goHome()">
                <div class="bg-indigo-100 p-2 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors duration-300 text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </div>
                סייר המאגר
            </div>
            <a href="about.html" class="group flex items-center gap-2 text-sm font-bold text-slate-700 bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-200 hover:text-indigo-700 px-5 py-2.5 rounded-full transition-all shadow-sm">
                <span>אודות המאגר</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-180 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
        </div>
    </nav>

    <!-- באנר הודעות הנהלה חכם -->
    <div id="announcement-banner" class="hidden bg-gradient-to-r from-amber-100 to-orange-50 border-b border-amber-200 py-2.5 px-4 shadow-sm relative overflow-hidden z-40">
        <div class="max-w-7xl mx-auto flex items-center gap-3">
            <div class="bg-white/60 p-1.5 rounded-lg text-orange-600 flex-shrink-0 z-10 shadow-sm backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" /></svg>
            </div>
            <div class="flex-1 overflow-hidden relative flex items-center h-6">
                <p id="announcement-text" class="text-orange-900 text-[15px] font-bold absolute right-0"></p>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8 md:py-12 flex-1 w-full relative z-10">
        
        <!-- סרגל עליון: חיפוש + מה חדש -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <!-- חיפוש גלובלי מיידי -->
            <div class="relative group flex-1">
                <div class="absolute inset-y-0 right-0 pr-6 flex items-center pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400 group-focus-within:text-indigo-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="חפש פודקאסט, פרק, או נושא..." class="block w-full bg-white/80 backdrop-blur-md border border-white/50 rounded-[2rem] py-5 pr-14 pl-6 text-slate-800 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-lg transition-all text-lg font-medium placeholder:text-slate-400">
            </div>

            <!-- כפתור מה חדש -->
            <button onclick="showNewestFiles()" class="bg-gradient-to-l from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white font-bold py-5 px-8 rounded-[2rem] shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-3 flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
                <span class="text-lg">מה חדש?</span>
            </button>
        </div>

        <!-- סרגל כלים: פירורי לחם, תצוגה ומיון -->
        <div class="bg-white/60 backdrop-blur-xl p-3 md:p-4 rounded-[1.5rem] border border-white/50 mb-8 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
            
            <!-- פירורי לחם -->
            <div id="breadcrumbs" class="flex items-center gap-2 overflow-x-auto no-scrollbar whitespace-nowrap w-full md:w-auto px-2"></div>

            <!-- אפשרויות תצוגה ומיון -->
            <div class="flex items-center gap-4 w-full md:w-auto justify-end px-2">
                <!-- בחירת מיון -->
                <div class="flex items-center gap-2 bg-white/50 px-3 py-1.5 rounded-xl border border-white/50">
                    <label class="text-sm font-bold text-slate-500 hidden sm:block">מיון:</label>
                    <select id="sort-select" onchange="changeSort(this.value)" class="bg-transparent text-indigo-900 text-sm font-bold focus:outline-none cursor-pointer">
                        <option value="date-new">החדשים קודם</option>
                        <option value="date-old">הישנים קודם</option>
                        <option value="name-asc">א - ת</option>
                        <option value="name-desc">ת - א</option>
                    </select>
                </div>
                
                <div class="h-8 w-px bg-slate-200 hidden sm:block"></div>

                <!-- החלפת תצוגה -->
                <div class="flex bg-white/50 border border-white/50 rounded-xl p-1 shadow-sm">
                    <button onclick="changeView('grid')" id="view-grid-btn" class="p-2 rounded-lg transition-colors" title="תצוגת רשת">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    </button>
                    <button onclick="changeView('list')" id="view-list-btn" class="p-2 rounded-lg transition-colors" title="תצוגת רשימה">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- אזור התוכן המרכזי -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- התוכן ייטען כאן מיידית מהזיכרון -->
        </div>
    </main>

    <footer class="mt-auto py-8 text-center border-t border-slate-200/60 bg-white/30 backdrop-blur-md relative z-10">
        <p class="text-slate-500 text-sm font-medium">
            מערכת מאגר פודקאסטים חכמה • פותח באהבה על ידי 
            <a href="https://mytovmail.github.io/Good-heart/" target="_blank" class="font-black text-indigo-500 hover:text-indigo-700 hover:underline transition-colors relative inline-block">
                לב טוב
            </a>
        </p>
    </footer>

    <script>
        // מזהה תיקיית השורש 
        const ROOT_ID = '1YvJzJJlKzKMunkYQWAqwFGK6VElIW-WT';
        
        let db = { folders: {}, files: {} }; 
        let navigationStack = [{ id: ROOT_ID, name: 'ראשי' }];
        let siteConfig = {};
        
        // הגדרות תצוגה ומיון נשמרות בדפדפן
        let currentView = localStorage.getItem('podcast_view') || 'grid';
        let currentSort = localStorage.getItem('podcast_sort') || 'date-new';

        function getResourceUrl(filename) {
            const protocol = window.location.protocol;
            if (protocol === 'blob:' || protocol === 'data:' || protocol === 'file:') {
                return `https://mytovmail.github.io/Podcast-database/${filename}?v=${Date.now()}`;
            }
            return `${filename}?v=${Date.now()}`;
        }

        async function initApp() {
            try {
                updateViewToggleUI();

                const configRes = await fetch(getResourceUrl('config.json'));
                if (configRes.ok) {
                    siteConfig = await configRes.json();
                    
                    if (siteConfig.announcement && siteConfig.announcement.trim() !== "") {
                        const annText = document.getElementById('announcement-text');
                        annText.textContent = siteConfig.announcement;
                        
                        if (siteConfig.announcement.length > 60) {
                            annText.classList.add('scroll-active');
                        } else {
                            annText.classList.remove('absolute', 'right-0');
                            annText.classList.add('w-full', 'text-center');
                        }
                        
                        document.getElementById('announcement-banner').classList.remove('hidden');
                    }
                }

                const savedStack = localStorage.getItem('podcast_nav_stack');
                if (savedStack) {
                    try {
                        navigationStack = JSON.parse(savedStack);
                        if (!Array.isArray(navigationStack) || navigationStack.length === 0) {
                            navigationStack = [{ id: ROOT_ID, name: 'ראשי' }];
                        }
                    } catch(e) {
                        navigationStack = [{ id: ROOT_ID, name: 'ראשי' }];
                    }
                }

                document.getElementById('splash-status').textContent = "טוען אינדקס קבצים מגיטהאב...";
                const dbRes = await fetch(getResourceUrl('database.json'));
                if (!dbRes.ok) throw new Error("מסד הנתונים לא נמצא");
                db = await dbRes.json();

                hideSplash();
                
                if (navigationStack.length > 0) {
                    const currentFolderId = navigationStack[navigationStack.length - 1].id;
                    if (!db.folders[currentFolderId]) {
                        navigationStack = [{ id: ROOT_ID, name: 'ראשי' }];
                    }
                }
                renderFolder(navigationStack[navigationStack.length - 1].id);

            } catch (e) {
                console.error(e);
                document.getElementById('splash-status').innerHTML = "<span class='text-red-400 font-bold'>שגיאה בטעינת הנתונים. רענן את העמוד.</span>";
            }
        }

        // --- ניהול תצוגה ומיון ---

        function changeView(view) {
            currentView = view;
            localStorage.setItem('podcast_view', view);
            updateViewToggleUI();
            reRenderCurrentState();
        }

        function changeSort(sort) {
            currentSort = sort;
            localStorage.setItem('podcast_sort', sort);
            reRenderCurrentState();
        }

        function updateViewToggleUI() {
            document.getElementById('sort-select').value = currentSort;
            
            const gridBtn = document.getElementById('view-grid-btn');
            const listBtn = document.getElementById('view-list-btn');
            const gridContainer = document.getElementById('content-grid');

            if (currentView === 'grid') {
                gridBtn.className = 'p-2 rounded-lg bg-indigo-100 text-indigo-700 shadow-sm transition-colors';
                listBtn.className = 'p-2 rounded-lg text-slate-400 hover:text-indigo-500 transition-colors';
                gridContainer.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';
            } else {
                listBtn.className = 'p-2 rounded-lg bg-indigo-100 text-indigo-700 shadow-sm transition-colors';
                gridBtn.className = 'p-2 rounded-lg text-slate-400 hover:text-indigo-500 transition-colors';
                gridContainer.className = 'grid grid-cols-1 md:grid-cols-2 gap-4'; // רשימה תהיה ב-2 עמודות במסכים גדולים
            }
        }

        function reRenderCurrentState() {
            const query = document.getElementById('search-input').value.trim();
            if (query.length >= 2) {
                handleSearch();
            } else if (document.getElementById('breadcrumbs').innerText.includes("התווספו לאחרונה")) {
                showNewestFiles();
            } else {
                renderFolder(navigationStack[navigationStack.length - 1].id);
            }
        }

        function sortFoldersArray(folderIds) {
            return folderIds.map(id => ({ id, ...db.folders[id] })).sort((a, b) => {
                if (currentSort === 'name-desc') return b.name.localeCompare(a.name, 'he');
                return a.name.localeCompare(b.name, 'he'); 
            });
        }

        function sortFilesArray(fileIds) {
            return fileIds.map(id => db.files[id]).filter(Boolean).sort((a, b) => {
                if (currentSort === 'name-asc') return a.name.localeCompare(b.name, 'he');
                if (currentSort === 'name-desc') return b.name.localeCompare(a.name, 'he');
                if (currentSort === 'date-old') return new Date(a.createdTime || 0) - new Date(b.createdTime || 0);
                return new Date(b.createdTime || 0) - new Date(a.createdTime || 0); 
            });
        }

        // --- רינדור והצגה ---

        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 700);
        }

        function renderFolder(folderId) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            localStorage.setItem('podcast_nav_stack', JSON.stringify(navigationStack));
            renderBreadcrumbs();

            const folderData = db.folders[folderId];
            if (!folderData) {
                grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 fade-in"><div class="text-6xl mb-4">📂</div><h3 class="text-2xl font-bold text-slate-800 mb-2">התיקייה לא נמצאה</h3><p class="text-slate-500">ייתכן שהיא נמחקה או הוזזה. נסה לחזור לראשי.</p></div>';
                return;
            }

            const sortedFolders = sortFoldersArray(folderData.subFolders);
            sortedFolders.forEach((folder, index) => {
                renderFolderCard(folder.id, folder, index * 0.05);
            });

            const sortedFiles = sortFilesArray(folderData.files);
            sortedFiles.forEach((file, index) => {
                renderFileCard(file, (sortedFolders.length + index) * 0.05);
            });
            
            if (sortedFolders.length === 0 && sortedFiles.length === 0) {
                 grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 fade-in"><div class="text-6xl mb-4">📭</div><h3 class="text-2xl font-bold text-slate-800 mb-2">תיקייה ריקה</h3><p class="text-slate-500">לא נמצאו קבצים בתיקייה זו.</p></div>';
            }
        }

        function renderFolderCard(folderId, folder, delay = 0) {
            const grid = document.getElementById('content-grid');
            const card = document.createElement('div');
            
            const paddingClass = currentView === 'list' ? 'p-4' : 'p-6 flex-col items-center text-center';
            const iconMargin = currentView === 'list' ? '' : 'mb-4';
            
            card.className = `bg-white/70 backdrop-blur-lg border border-white/60 ${paddingClass} rounded-[1.5rem] shadow-xl shadow-slate-200/40 cursor-pointer hover:-translate-y-1.5 hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-indigo-100 transition-all duration-300 flex ${currentView === 'list' ? 'items-center gap-5' : ''} group`;
            card.style.animation = `fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards ${delay}s`;
            card.style.opacity = '0';
            
            card.onclick = () => {
                document.getElementById('search-input').value = ''; 
                navigationStack.push({ id: folderId, name: folder.name });
                renderFolder(folderId);
            };
            
            card.innerHTML = `
                <div class="${iconMargin} w-14 h-14 shrink-0 bg-gradient-to-br from-indigo-100 to-blue-50 rounded-2xl text-indigo-500 flex items-center justify-center group-hover:from-indigo-500 group-hover:to-blue-600 group-hover:text-white transition-all duration-500 shadow-inner group-hover:shadow-[0_0_20px_rgba(99,102,241,0.4)]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>
                </div>
                <div class="flex-1 overflow-hidden">
                    <h3 class="font-bold text-slate-800 truncate ${currentView === 'list' ? 'text-lg' : 'text-xl'} group-hover:text-indigo-900 transition-colors">${folder.name}</h3>
                </div>
                ${currentView === 'list' ? '<div class="text-slate-300 group-hover:text-indigo-400 group-hover:-translate-x-1 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg></div>' : ''}
            `;
            grid.appendChild(card);
        }

        function renderFileCard(file, delay = 0) {
            const grid = document.getElementById('content-grid');
            const cleanName = file.name.replace(/\.[^/.]+$/, "");
            
            const safeName = cleanName.replace(/[&<>'"]/g, 
                tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag)
            );

            const viewUrl = `https://drive.google.com/file/d/${file.id}/view`;
            const card = document.createElement('div');
            
            card.style.animation = `fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards ${delay}s`;
            card.style.opacity = '0';
            
            if (currentView === 'list') {
                card.className = 'bg-white/80 backdrop-blur-lg rounded-[1.5rem] p-4 shadow-lg shadow-slate-200/30 border border-white/60 flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:-translate-y-1 hover:shadow-xl hover:border-indigo-100 transition-all duration-300 group';
                card.innerHTML = `
                    <div class="flex items-center gap-4 w-full sm:w-auto overflow-hidden">
                        <div class="w-12 h-12 bg-slate-50 border border-slate-100 rounded-xl text-indigo-400 hidden sm:flex shrink-0 items-center justify-center group-hover:text-indigo-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
                        </div>
                        <div class="min-w-0">
                            <span class="text-[10px] font-bold text-indigo-500 block mb-1 tracking-widest">קובץ שמע</span>
                            <h3 class="font-bold text-slate-800 leading-tight truncate text-lg group-hover:text-indigo-900 transition-colors" title="${safeName}">${safeName}</h3>
                        </div>
                    </div>
                    <button onclick="openPlayerPopup('${viewUrl}')" class="w-full sm:w-auto shrink-0 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-2.5 px-6 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-md shadow-indigo-500/20 hover:shadow-indigo-500/40 transform hover:scale-105">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                        <span>האזנה</span>
                    </button>
                `;
            } else {
                card.className = 'bg-white/80 backdrop-blur-lg rounded-[2rem] p-6 shadow-xl shadow-slate-200/40 border border-white/60 flex flex-col justify-between h-full hover:-translate-y-2 hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-indigo-100 transition-all duration-300 group';
                card.innerHTML = `
                    <div class="mb-6 relative">
                        <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-400 mb-4 group-hover:scale-110 group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-all duration-300">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
                        </div>
                        <span class="absolute top-2 left-0 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-2 py-1 rounded-md">שמע</span>
                        <h3 class="font-bold text-slate-800 text-lg leading-tight line-clamp-2 group-hover:text-indigo-900 transition-colors" title="${safeName}">${safeName}</h3>
                    </div>
                    <button onclick="openPlayerPopup('${viewUrl}')" class="mt-auto w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 transform group-hover:scale-[1.02]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                        <span>האזנה וצפייה</span>
                    </button>
                `;
            }
            grid.appendChild(card);
        }

        // --- חיפוש ופונקציונליות ---

        function handleSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const grid = document.getElementById('content-grid');
            
            if (query.length < 2) {
                renderFolder(navigationStack[navigationStack.length - 1].id);
                return;
            }

            grid.innerHTML = '';
            let resultsCount = 0;
            
            const matchedFoldersIds = [];
            Object.keys(db.folders).forEach(id => {
                if (db.folders[id].name.toLowerCase().includes(query)) {
                    matchedFoldersIds.push(id);
                }
            });
            
            sortFoldersArray(matchedFoldersIds).forEach((folder, index) => {
                if (resultsCount < 50) {
                    renderFolderCard(folder.id, folder, index * 0.05);
                    resultsCount++;
                }
            });

            const matchedFilesIds = [];
            Object.values(db.files).forEach(file => {
                if (file.name.toLowerCase().includes(query)) {
                    matchedFilesIds.push(file.id);
                }
            });

            sortFilesArray(matchedFilesIds).forEach((file, index) => {
                if (resultsCount < 50) {
                    renderFileCard(file, (matchedFoldersIds.length + index) * 0.05);
                    resultsCount++;
                }
            });

            if (resultsCount === 0) {
                grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 fade-in"><div class="text-6xl mb-4 text-slate-300">🔍</div><h3 class="text-2xl font-bold text-slate-800 mb-2">לא מצאנו כלום</h3><p class="text-slate-500">נסה לחפש במילים אחרות או קצרות יותר.</p></div>';
            }
        }

        function showNewestFiles() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            document.getElementById('search-input').value = '';
            
            document.getElementById('sort-select').value = 'date-new';
            currentSort = 'date-new';
            localStorage.setItem('podcast_sort', 'date-new');

            const container = document.getElementById('breadcrumbs');
            container.innerHTML = `
                <button class="text-sm font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors" onclick="goHome()">ראשי</button>
                <span class="text-slate-300 mx-1">/</span>
                <span class="text-sm font-bold text-white bg-gradient-to-r from-orange-400 to-amber-500 px-3 py-1.5 rounded-lg shadow-sm">✨ התווספו לאחרונה</span>
            `;

            const allFilesIds = Object.keys(db.files);
            const sortedFiles = sortFilesArray(allFilesIds);
            
            const newestFiles = sortedFiles.slice(0, 40);

            if (newestFiles.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400">אין עדיין קבצים במאגר.</div>';
                return;
            }

            newestFiles.forEach((file, index) => {
                renderFileCard(file, index * 0.05);
            });
        }

        function openPlayerPopup(url) {
            const width = 600;
            const height = 450;
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            
            window.open(
                url, 
                'PodcastPlayerPopup', 
                `width=${width},height=${height},top=${top},left=${left},toolbar=no,location=no,status=no,menubar=no,scrollbars=yes,resizable=yes`
            );
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = '';
            navigationStack.forEach((nav, idx) => {
                const btn = document.createElement('button');
                btn.className = `text-sm font-bold px-3 py-1.5 rounded-lg transition-colors ${idx === navigationStack.length - 1 ? 'text-indigo-900 bg-white/80 shadow-sm border border-white' : 'text-indigo-600 hover:bg-indigo-50/80'}`;
                btn.textContent = nav.name;
                btn.onclick = () => {
                    navigationStack = navigationStack.slice(0, idx + 1);
                    document.getElementById('search-input').value = '';
                    renderFolder(nav.id);
                };
                container.appendChild(btn);
                if (idx < navigationStack.length - 1) {
                    const separator = document.createElement('span');
                    separator.className = "text-slate-300 mx-1";
                    separator.textContent = "/";
                    container.appendChild(separator);
                }
            });
        }

        function goHome() { 
            document.getElementById('search-input').value = '';
            navigationStack = [{ id: ROOT_ID, name: 'ראשי' }]; 
            renderFolder(ROOT_ID); 
        }

        initApp();
    </script>
</body>
