<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר הפודקאסטים - מהירות שיא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap');
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 32px 32px;
            padding-bottom: 60px;
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        iframe { width: 100%; height: 140px; border-radius: 12px; border: none; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen relative overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-900">
    
    <!-- מסך פתיחה חכם -->
    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-500 bg-slate-900">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 opacity-95"></div>
        <div class="relative z-10 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10 mb-6 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">מאגר הפודקאסטים</h1>
            <p id="splash-status" class="text-indigo-200 text-sm font-medium">טוען את מסד הנתונים...</p>
        </div>
    </div>

    <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="font-black text-xl text-indigo-900 flex items-center gap-2 cursor-pointer" onclick="goHome()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                סייר המאגר
            </div>
            <a href="about.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 bg-slate-100 px-4 py-2 rounded-full transition-colors">אודות והצטרפות</a>
        </div>
    </nav>

    <!-- באנר הודעות הנהלה -->
    <div id="announcement-banner" class="hidden bg-yellow-50 border-b border-yellow-100 py-3 px-4">
        <div class="max-w-7xl mx-auto flex items-center gap-3">
            <p id="announcement-text" class="text-yellow-900 text-sm font-bold truncate"></p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- חיפוש גלובלי מיידי -->
        <div class="mb-8 relative group">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="חפש מיידית בכל עשרות אלפי הקבצים..." class="block w-full bg-white border border-slate-200 rounded-2xl py-4 pr-11 pl-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-sm transition-all">
        </div>

        <!-- פירורי לחם -->
        <div class="bg-white/50 backdrop-blur-xl p-3 rounded-xl border border-white mb-6 flex items-center gap-2 overflow-x-auto no-scrollbar whitespace-nowrap" id="breadcrumbs"></div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- התוכן ייטען כאן מיידית מהזיכרון -->
        </div>
    </div>

    <script>
        // מזהה תיקיית השורש (חייב להתאים למה שמוגדר בסקריפט העדכון)
        const ROOT_ID = '1YvJzJJlKzKMunkYQWAqwFGK6VElIW-WT';
        
        let db = { folders: {}, files: {} }; // מסד הנתונים שיטען מהקובץ
        let navigationStack = [{ id: ROOT_ID, name: 'ראשי' }];
        let isMember = false;
        let siteConfig = { groupPassword: "" };

        async function initApp() {
            try {
                // 1. טעינת הגדרות האתר
                const configRes = await fetch('config.json?v=' + Date.now());
                if (configRes.ok) {
                    siteConfig = await configRes.json();
                    if (siteConfig.announcement) {
                        document.getElementById('announcement-text').textContent = siteConfig.announcement;
                        document.getElementById('announcement-banner').classList.remove('hidden');
                    }
                }
                isMember = (localStorage.getItem('site_password') === siteConfig.groupPassword);

                // 2. טעינת מסד הנתונים הגדול מגיטהאב
                document.getElementById('splash-status').textContent = "טוען אינדקס קבצים...";
                const dbRes = await fetch('database.json?v=' + Date.now());
                if (!dbRes.ok) throw new Error("מסד הנתונים לא נמצא");
                db = await dbRes.json();

                // סיום והצגת האתר
                hideSplash();
                renderFolder(ROOT_ID);

            } catch (e) {
                console.error(e);
                document.getElementById('splash-status').innerHTML = "<span class='text-red-400'>שגיאה בטעינת הנתונים. נסה שוב.</span>";
            }
        }

        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
        }

        function renderFolder(folderId) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            renderBreadcrumbs();

            // משיכת התוכן מה-DB המקומי (מיידי!)
            const folderData = db.folders[folderId];
            if (!folderData) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400">התיקייה לא נמצאה באינדקס.</div>';
                return;
            }

            // הצגת תיקיות
            folderData.subFolders.forEach(subId => {
                const sub = db.folders[subId];
                if (!sub) return;
                const card = document.createElement('div');
                card.className = 'fade-in bg-white p-5 rounded-2xl shadow-sm border border-slate-100 cursor-pointer hover:shadow-md transition-all flex items-center gap-4 group';
                card.onclick = () => {
                    navigationStack.push({ id: subId, name: sub.name });
                    renderFolder(subId);
                };
                card.innerHTML = `
                    <div class="bg-indigo-50 p-3 rounded-xl text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>
                    </div>
                    <div class="flex-1 overflow-hidden"><h3 class="font-bold text-slate-800 truncate">${sub.name}</h3></div>
                `;
                grid.appendChild(card);
            });

            // הצגת קבצים
            folderData.files.forEach(fileId => {
                const file = db.files[fileId];
                if (!file) return;
                renderFileCard(file);
            });
        }

        function renderFileCard(file) {
            const grid = document.getElementById('content-grid');
            const cleanName = file.name.replace(/\.[^/.]+$/, "");
            const previewUrl = `https://drive.google.com/file/d/${file.id}/preview`;
            const card = document.createElement('div');
            card.className = 'fade-in bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col';
            
            let playerHTML = isMember ? `<iframe src="${previewUrl}" allow="autoplay" class="mt-4"></iframe>` : `
                <div class="mt-4 h-[140px] bg-slate-50 rounded-xl flex items-center justify-center">
                    <a href="about.html" class="bg-indigo-600 text-white text-xs font-bold px-4 py-2 rounded-full">התחבר להאזנה</a>
                </div>`;

            card.innerHTML = `
                <div class="mb-2">
                    <span class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">קובץ שמע</span>
                    <h3 class="font-bold text-slate-800 leading-tight line-clamp-2" title="${cleanName}">${cleanName}</h3>
                </div>
                ${playerHTML}
            `;
            grid.appendChild(card);
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const grid = document.getElementById('content-grid');
            
            if (query.length < 2) {
                renderFolder(navigationStack[navigationStack.length - 1].id);
                return;
            }

            grid.innerHTML = '';
            
            // חיפוש גלובלי מהיר בזיכרון המקומי
            let resultsCount = 0;
            Object.values(db.files).forEach(file => {
                if (file.name.toLowerCase().includes(query)) {
                    if (resultsCount < 50) renderFileCard(file);
                    resultsCount++;
                }
            });

            if (resultsCount === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400">לא נמצאו תוצאות לחיפוש זה.</div>';
            }
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = '';
            navigationStack.forEach((nav, idx) => {
                const btn = document.createElement('button');
                btn.className = `text-sm font-bold ${idx === navigationStack.length - 1 ? 'text-slate-800' : 'text-indigo-600'}`;
                btn.textContent = nav.name;
                btn.onclick = () => {
                    navigationStack = navigationStack.slice(0, idx + 1);
                    renderFolder(nav.id);
                };
                container.appendChild(btn);
                if (idx < navigationStack.length - 1) container.innerHTML += '<span class="text-slate-300 mx-1">/</span>';
            });
        }

        function goHome() { navigationStack = [{ id: ROOT_ID, name: 'ראשי' }]; renderFolder(ROOT_ID); }

        initApp();
    </script>
</body>
</html>
